$schema: https://json-schema.org/draft/2020-12/schema
title: Competency Model
type: object
additionalProperties: false
required: [id, schema_version, content_version, status, source, confidence, created_at, updated_at, domain_pack_id, competencies]
properties:
  id: {$ref: common.schema.yaml#/$defs/id}
  schema_version: {$ref: common.schema.yaml#/$defs/version}
  content_version: {$ref: common.schema.yaml#/$defs/version}
  status: {$ref: common.schema.yaml#/$defs/status}
  source: {$ref: common.schema.yaml#/$defs/source}
  confidence: {$ref: common.schema.yaml#/$defs/confidence}
  created_at: {$ref: common.schema.yaml#/$defs/timestamp}
  updated_at: {$ref: common.schema.yaml#/$defs/timestamp}
  domain_pack_id: {type: string, minLength: 1}
  competencies:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [id, category, current_level, target_level, weight, behaviors, evidence_requirements]
      properties:
        id: {$ref: common.schema.yaml#/$defs/id}
        category: {type: string, minLength: 1}
        current_level: {type: number}
        target_level: {type: number}
        weight: {type: number}
        behaviors: {type: array}
        evidence_requirements: {type: array}
  extensions: {$ref: common.schema.yaml#/$defs/extensions}
