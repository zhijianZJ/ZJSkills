$schema: https://json-schema.org/draft/2020-12/schema
title: Learning System State
type: object
additionalProperties: false
required: [id, schema_version, content_version, status, source, confidence, created_at, updated_at, learner_id, current_stage, stage_states, active_versions, next_action]
properties:
  id: {$ref: common.schema.yaml#/$defs/id}
  schema_version: {$ref: common.schema.yaml#/$defs/version}
  content_version: {$ref: common.schema.yaml#/$defs/version}
  status: {$ref: common.schema.yaml#/$defs/status}
  source: {$ref: common.schema.yaml#/$defs/source}
  confidence: {$ref: common.schema.yaml#/$defs/confidence}
  created_at: {$ref: common.schema.yaml#/$defs/timestamp}
  updated_at: {$ref: common.schema.yaml#/$defs/timestamp}
  learner_id: {type: string, minLength: 1}
  current_stage: {type: string, minLength: 1}
  stage_states: {type: object}
  active_versions:
    type: object
    additionalProperties: {type: string, minLength: 1}
  next_action: {type: string, minLength: 1}
  extensions: {$ref: common.schema.yaml#/$defs/extensions}
