$schema: https://json-schema.org/draft/2020-12/schema
title: Learning Assessment
type: object
additionalProperties: false
required: [id, schema_version, content_version, status, source, confidence, created_at, updated_at, stage, tasks, evidence_ids, competency_results, decision, next_action]
properties:
  id: {$ref: common.schema.yaml#/$defs/id}
  schema_version: {$ref: common.schema.yaml#/$defs/version}
  content_version: {$ref: common.schema.yaml#/$defs/version}
  status: {$ref: common.schema.yaml#/$defs/status}
  source: {$ref: common.schema.yaml#/$defs/source}
  confidence: {$ref: common.schema.yaml#/$defs/confidence}
  created_at: {$ref: common.schema.yaml#/$defs/timestamp}
  updated_at: {$ref: common.schema.yaml#/$defs/timestamp}
  stage: {type: string}
  tasks: {type: array}
  evidence_ids: {type: array, items: {type: string}}
  competency_results: {type: array}
  decision: {type: string}
  next_action: {type: string}
  extensions: {$ref: common.schema.yaml#/$defs/extensions}
