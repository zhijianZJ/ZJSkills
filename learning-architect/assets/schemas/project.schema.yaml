$schema: https://json-schema.org/draft/2020-12/schema
title: Learning Project
type: object
additionalProperties: false
required: [id, schema_version, content_version, status, source, confidence, created_at, updated_at, problem, inputs, constraints, deliverables, competency_ids, business_value, rubric]
properties:
  id: {$ref: common.schema.yaml#/$defs/id}
  schema_version: {$ref: common.schema.yaml#/$defs/version}
  content_version: {$ref: common.schema.yaml#/$defs/version}
  status: {$ref: common.schema.yaml#/$defs/status}
  source: {$ref: common.schema.yaml#/$defs/source}
  confidence: {$ref: common.schema.yaml#/$defs/confidence}
  created_at: {$ref: common.schema.yaml#/$defs/timestamp}
  updated_at: {$ref: common.schema.yaml#/$defs/timestamp}
  problem: {type: string}
  inputs: {type: array}
  constraints: {type: array}
  deliverables: {type: array}
  competency_ids: {type: array, items: {type: string}}
  business_value: {type: string}
  rubric: {type: object}
  extensions: {$ref: common.schema.yaml#/$defs/extensions}
