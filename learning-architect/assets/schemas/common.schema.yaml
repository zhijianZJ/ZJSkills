$schema: https://json-schema.org/draft/2020-12/schema
title: Learning Architect Common Contracts
type: object
$defs:
  id:
    type: string
    minLength: 1
  version:
    type: string
    minLength: 1
  status:
    type: string
    minLength: 1
  source:
    type: string
    minLength: 1
  confidence:
    type: number
    minimum: 0
    maximum: 1
  timestamp:
    type: string
    format: date-time
  extensions:
    type: object
    additionalProperties: true
